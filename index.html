  <title>KittenOS</title>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box; 
      overscroll-behavior-y: none;
    }
a {
color: green;
text-decoration: none;
}
a:visited {
color: red;
}

    body {
overflow: auto;
    overflow-x: hidden;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: #067; 
     
      color: #003;
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      transition: background-image 0.3s ease, background-color 0.3s ease;
    }

    input, button, panel {
      backdrop-filter: blur(3.5px) saturate(110%) !important;
      -webkit-backdrop-filter: blur(3.5px) saturate(110%) !important;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-bottom: 0.67px solid rgba(255, 255, 255, 0.25); border-top: 0.67px solid rgba(255, 255, 255, 0.25);
      border-radius: 25px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      z-index: 1000;
      outline: none;
      color: #003;
    } 
    
    panel {
      display: block;
      padding: 5px 5px;
    }

    button:active {
      transform: scale(0.99);
    }

    #hiPan {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      visibility: visible;
      transition: opacity 1s ease, visibility 0s linear 0.4s;
      text-shadow: 0 4px 15px rgba(255, 255, 255, 0.6);
    }

    #hiPan.show {
      opacity: 1;
      visibility: visible;
      transition: opacity 1s ease;
    }

    .alert {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      text-shadow: 0 4px 15px rgba(255, 255, 255, 0.6);
    }

#apps {
  height: calc(100% - 5px) !important;
  max-height: calc(100% - 5px) !important;
  width: 60px !important;
  position: fixed;
  margin: 2.5px;
  top: 0;
  left: 0;
  overflow: visible;
  
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  border: none !important;
  background: none !important;
}

#apps::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(3.5px) saturate(110%);
  -webkit-backdrop-filter: blur(3.5px) saturate(110%);
  z-index: -1;
}
    
    .appIcon {
      width: 50px;
      height: 50px;
      padding: 0 !important;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

.application {
  position: fixed;
  top: 0;
  left: 65px;
  height: 100%;
  width: calc(100% - 65px);
  border: none;
  z-index: 10; 

  opacity: 0;
  transform: scale(0.96);
  
  transition: opacity 0.5s ease-out, transform 0.5s ease-out;
}

.application.visible {
  opacity: 1;
  transform: scale(1);
}

    #closeBtn {
  position: fixed; 
  top: 5px; 
  right: 5px; 
  color: red; 
  font-weight: bold; 
  width: 50px; 
  height: 50px; 
  font-size: 18px;
  z-index: 200000;
  cursor: move;
  user-select: none;
}
  input[type="checkbox"] {
    accent-color: #008;
    width: 18px;
    height: 18px;
  }
  input[type="checkbox"]:hover {accent-color: #069;}
  #app-installer{
    position: fixed;
    top: 50% !important; left: 50% !important;
    transform: translate(-50%, -50%) !important;
    display: none;
}
:root {
      --bg: #0b0b0f;
      --frame: rgba(255,255,255,.78);
      --text: #ffffff;
      --green: #34c759;
      --yellow: #ffd60a;
      --red: red;
    }

    * { box-sizing: border-box; }

    .wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
      scale: 0.67;
    }

    .battery {
      position: relative;
      width: 128px;
      height: 62px;
      padding: 4px;
      border: 1px solid var(--frame);
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 20px;
      width: 6px;
      height: 20px;
      border-radius: 0 4px 4px 0;
      background: var(--frame);
    }

    .fill {
      position: absolute;
      inset: 4px;
      width: 50%;
      border-radius: 11px;
      background: var(--green);
      transition: width .35s ease, background-color .35s ease;
    }

    .battery.charging .fill {
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.01); }
    }

    .label {
      position: absolute;
      inset: 0;
      display: flex;
      place-items: center;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 1px 1px rgba(0,0,0,.25);
      z-index: 2;
      user-select: none;
    }

    .status {
      font-size: 15px;
      opacity: .9;
      letter-spacing: -0.01em;
    }
    
.appIcon {
  position: relative; 
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none; 
  touch-action: manipulation; 
}

.app-tooltip {
  position: fixed; 
  left: 70px; 
  top: 0;
  transform: translateY(-50%) scale(0.95);
  padding: 6px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 5000;
  white-space: nowrap;
}

.app-tooltip.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(-50%) scale(1.02);
}

.tooltip-name {
  font-size: 13px;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  font-weight: bold;
}

.tooltip-del-btn {
  border-radius: 6px;
  color: #f00;
  font-size: 11px;
  padding: 2px 6px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: none;
}
.tooltip-del-btn:active {
  transform: scale(0.95);
}
.appIcon.opened {
    background: rgba(0, 200, 100, 0.2);
}
.appIcon.nowOp {
    background: rgba(200, 0, 100, 0.2);
}
#applications {
  max-height: calc(100% - 60px);
  border-radius: 30px;
  overflow-y: auto;
}
.tooltip {  margin: 5px 65px; display: none; z-index: 99999999;  }
#pinPan button{
    font-size: 24px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
}
  </style>
</head>

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open("KittenOS_DB", 2);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("apps")) {
        db.createObjectStore("apps", { keyPath: "id" });
      }
      if (!db.objectStoreNames.contains("wallpapers")) {
        db.createObjectStore("wallpapers");
      }
    };
    request.onsuccess = (e) => resolve(e.target.result);
    request.onerror = (e) => reject(e.target.error);
  });
}

function loadAppsFromDB(db) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction("apps", "readonly");
    const store = tx.objectStore("apps");
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

function saveAppToDB(app) {
  openDB().then(db => {
    const tx = db.transaction("apps", "readwrite");
    const store = tx.objectStore("apps");
    
    store.put({
      id: app.id,
      name: app.name,
      icon: app.icon,
      file: app.file
    });
  }).catch(err => console.error("IndexedDB error:", err));
}

        document.querySelectorAll('.appIcon.touch-active').forEach(el => {
          if (el !== btn) {

        btn.classList.add('touch-active');
        tooltip.classList.add('visible');
      }, 1500);
    });

    btn.addEventListener('touchend', () => {
      clearTimeout(touchTimeout);
    });

    btn.addEventListener('touchcancel', () => {
      clearTimeout(touchTimeout);
    });

    const showTooltip = () => {

      const rect = btn.getBoundingClientRect();
      tooltip.style.top = (rect.top + rect.height / 2) + "px";
      tooltip.classList.add('visible');
    };
    const hideTooltipDelayed = () => {

    };
    btn.addEventListener('mouseenter', showTooltip);
    btn.addEventListener('mouseleave', hideTooltipDelayed);
    tooltip.addEventListener('mouseenter', () => clearTimeout(hoverHideTimeout));
    tooltip.addEventListener('mouseleave', hideTooltipDelayed);

    container.appendChild(btn);

function toggleAppTrust(appId) {
  let whitelist = JSON.parse(localStorage.getItem('catos_trusted_apps') || '[]');
  const isCurrentlyTrusted = whitelist.includes(appId);

  if (!isCurrentlyTrusted) {
    const warningMessage = 
      "⚠️ WARNING: SECURITY RISK\n\n" +
      "By trusting this application, you remove its security sandbox and grant it UNRESTRICTED access to your KittenOS Core and File System.\n\n" +
      "Untrusted apps can function normally but cannot access or steal your data.\n\n" +
      "Are you sure you want to trust this app?";

    if (confirm(warningMessage)) {
      whitelist.push(appId);
      localStorage.setItem('catos_trusted_apps', JSON.stringify(whitelist));
      window.trustedAppsWhitelist = whitelist;
      showInfoBox("Application trusted. Please open it to apply full filesystem access.");
      renderApps();
    }
  } else {
    whitelist = whitelist.filter(id => id !== appId);
    localStorage.setItem('catos_trusted_apps', JSON.stringify(whitelist));
    window.trustedAppsWhitelist = whitelist;
    showInfoBox("Trust revoked. Application is now securely sandboxed.");
    renderApps();
    
    if(document.getElementById("iframe_" + appId)){closeApp(appId)}
   }
}

function openApp(id) {
  document.getElementById(id).classList.add('opened');
  document.getElementById(id).classList.add('nowOp');
  
  if (openedApp === id) {
    const currentIframe = document.getElementById("iframe_" + id);
    document.getElementById(openedApp).classList.remove('nowOp')
    if (currentIframe) {
      currentIframe.classList.remove("visible"); 
      setTimeout(() => {
        currentIframe.style.display = "none"; 
      }, 500);
    }
    openedApp = null;
    return;
  }

  if (openedApp !== null) {
    const oldIframe = document.getElementById("iframe_" + openedApp);
    if (oldIframe) {
      oldIframe.classList.remove("visible");
      oldIframe.style.display = "none"; 
    }
    document.getElementById(openedApp).classList.remove('nowOp')
  }

  let iframe = document.getElementById("iframe_" + id);
  if (!iframe) {
    const appData = applications.find(app => app.id === id);
    if (!appData) return;

    iframe = document.createElement("iframe");
    iframe.id = "iframe_" + id;
    iframe.className = "application";
    iframe.src = appData.code;
    
    const isSystemApp = (id === "cat-s_maps" || id === "cat-s_pres" || id === "cat-weather" || id === "cat-files" || id === "cat-camera" || id === "cat-gallery");
    const isTrusted = isSystemApp || window.trustedAppsWhitelist.includes(id);

    if (isTrusted) {
      
      iframe.removeAttribute('sandbox');
    } else {
      
      iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-popups allow-modals allow-downloads');
    }

    iframe.onload = function() {
      
      if (!isTrusted) return;

      try {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const iframeWin = iframe.contentWindow;
        const msgScript = iframeDoc.createElement("script");
        msgScript.textContent = `function message(type, data){ window.parent.postMessage({ type, data }, "*"); }`;
        iframeDoc.head.appendChild(msgScript);

        if (id !== "cat-browser") {
          const linkScript = iframeDoc.createElement("script");
          linkScript.textContent = `
            document.addEventListener('click', function(e) {
              let el = e.target;
              while (el && el !== document) {
                if (el.tagName === 'A' && el.href && /^https?:\\/\\//i.test(el.href)) {
                  e.preventDefault();
                  e.stopPropagation();
                  window.parent.postMessage({ type: 'openInBrowser', data: { url: el.href } }, '*');
                  return;
                }
                el = el.parentElement;
              }
            }, true);
          `;
          iframeDoc.head.appendChild(linkScript);
        }

        const devSwitch = document.getElementById("dev-switch");
        if (devSwitch && devSwitch.checked) {
          const erudaScript = iframeDoc.createElement("script");
          erudaScript.src = "../library/eruda.js"; 
          erudaScript.onload = function() {
            iframeWin.eruda.init();
            iframeWin.eruda.remove('sources');
            iframeWin.eruda.get().config.set('displaySize', 100);
            iframeWin.eruda.util.evalCss.setTheme("Material Lighter");
          };
          iframeDoc.head.appendChild(erudaScript);
        }
      } catch (e) {
        console.error("Failed to embed developer tools in iframe:", e);
      }
    };

    document.getElementById("KittenOS").appendChild(iframe);
  }

  iframe.style.display = "block";
  
  requestAnimationFrame(() => {
    
    requestAnimationFrame(() => {
      iframe.classList.add("visible");
    });
  });

  openedApp = id;
}

async function install() {
  const idInput = document.getElementById("ins-id").value.trim();
  const nameInput = document.getElementById("ins-name").value.trim();
  const iconInput = document.getElementById("ins-icon").value.trim();
  const fileInput = document.getElementById("ins-file");

  if (!idInput || !nameInput) {
    showInfoBox("Please fill in the fields App id and App name!");
    return;
  }

  const uploadedFiles = Array.from(fileInput.files);
  if (uploadedFiles.length === 0) {
    showInfoBox("Please, upload HTML or zip file!");
    return;
  }

  try {
    let filesMap = {};
    let htmlContent = "";

    if (uploadedFiles.length === 1 && uploadedFiles[0].name.endsWith('.zip')) {
      const zipFile = uploadedFiles[0];
      const jszip = new JSZip();
      const zip = await jszip.loadAsync(zipFile);
      
      const promises = [];

      zip.forEach((relativePath, file) => {
        if (!file.dir) {
          if (relativePath.includes('__MACOSX')) return;

          const pureName = relativePath.split('/').pop();
          
          const isImage = /\.(png|jpg|jpeg|gif|webp|svg|ico)$/i.test(pureName);

          let promise;
          if (isImage) {
            
            promise = file.async("base64").then((base64) => {
              let ext = pureName.split('.').pop().toLowerCase();
              if (ext === "jpg") ext = "jpeg";
              if (ext === "svg") ext = "svg+xml";
              const dataUrl = `data:image/${ext};base64,${base64}`;
              
              filesMap[pureName] = dataUrl;
              filesMap[relativePath] = dataUrl;
            });
          } else {
            
            promise = file.async("string").then((content) => {
              if (pureName.endsWith('.html')) {
                htmlContent = content;
              }
              filesMap[pureName] = content;
              filesMap[relativePath] = content;
            });
          }
          promises.push(promise);
        }
      });

      await Promise.all(promises);

    } else {
      
      const htmlFile = uploadedFiles.find(f => f.name.endsWith('.html'));
      if (!htmlFile) {
        showInfoBox("One of these files must be html!");
        return;
      }

      for (let file of uploadedFiles) {
        if (file !== htmlFile) {
          filesMap[file.name] = await readFileContent(file);
        }
      }
      htmlContent = await readFileContent(htmlFile);
    }

    if (!htmlContent) {
      showInfoBox("One of these files must be html!");
      return;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, "text/html");

    const replaceUrlsInCss = (cssText) => {
      let updatedCss = cssText;
      for (let key in filesMap) {
        if (filesMap[key].startsWith('data:image')) {
          const escapedKey = key.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
          const regex = new RegExp(`url\\(\\s*['"]?` + escapedKey + `['"]?\\s*\\)`, 'g');
          updatedCss = updatedCss.replace(regex, `url(${filesMap[key]})`);
        }
      }
      return updatedCss;
    };

    const links = doc.querySelectorAll('link[rel="stylesheet"]');
    links.forEach(link => {
      const href = link.getAttribute('href');
      if (href) {
        const pureHref = href.split('/').pop();
        let styleContent = filesMap[href] || filesMap[pureHref] || filesMap['./' + pureHref];
        if (styleContent) {
          styleContent = replaceUrlsInCss(styleContent); 
          const styleTag = doc.createElement('style');
          styleTag.textContent = styleContent;
          link.replaceWith(styleTag);
        }
      }
    });

    doc.querySelectorAll('style').forEach(styleTag => {
      styleTag.textContent = replaceUrlsInCss(styleTag.textContent);
    });

    const scripts = doc.querySelectorAll('script[src]');
    scripts.forEach(script => {
      const src = script.getAttribute('src');
      if (src) {
        const pureSrc = src.split('/').pop();
        const scriptContent = filesMap[src] || filesMap[pureSrc] || filesMap['./' + pureSrc];
        if (scriptContent) {
          const scriptTag = doc.createElement('script');
          scriptTag.textContent = scriptContent;
          script.removeAttribute('src'); 
          script.replaceWith(scriptTag);
        }
      }
    });

    doc.querySelectorAll('img[src]').forEach(img => {
      const src = img.getAttribute('src');
      if (src) {
        const pureSrc = src.split('/').pop();
        const imgData = filesMap[src] || filesMap[pureSrc] || filesMap['./' + pureSrc];
        if (imgData && imgData.startsWith('data:image')) {
          img.setAttribute('src', imgData);
        }
      }
    });

    doc.querySelectorAll('[style]').forEach(el => {
      let styleAttr = el.getAttribute('style');
      if (styleAttr && styleAttr.includes('url(')) {
        el.setAttribute('style', replaceUrlsInCss(styleAttr));
      }
    });

    const finalHtmlString = doc.documentElement.outerHTML;
    const finalBlob = new Blob([finalHtmlString], { type: 'text/html;charset=utf-8' });

    const blobUrl = URL.createObjectURL(finalBlob);
    const newApp = {
      id: idInput,
      name: nameInput,
      icon: iconInput || nameInput[0],
      code: blobUrl,
      file: finalBlob
    };

    applications.push(newApp);
    renderApps();
    saveAppToDB(newApp);

    document.getElementById("ins-id").value = "";
    document.getElementById("ins-name").value = "";
    document.getElementById("ins-icon").value = "";
    fileInput.value = ""; 
    document.getElementById("app-installer").style.display = "none";

    showInfoBox(`App "${nameInput}" was installed!`);

  } catch (error) {
    console.error(error);
    showInfoBox("Error processing files.");
  }
}

function readFileContent(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsText(file);
  });
}

function makeDragable(element) {
  let posX = 0, posY = 0, mouseX = 0, mouseY = 0;

  element.onmousedown = dragMouseDown;
  element.ontouchstart = dragMouseDown;

  function dragMouseDown(e) {
    e = e || window.event;
    const clientX = e.clientX || e.touches[0].clientX;
    const clientY = e.clientY || e.touches[0].clientY;
    
    mouseX = clientX;
    mouseY = clientY;
    
    document.onmouseup = closeDragElement;
    document.ontouchend = closeDragElement;
    
    document.onmousemove = elementDrag;
    document.ontouchmove = elementDrag;
  }

function elementDrag(e) {
  e = e || window.event;
  
  const clientX = e.clientX || (e.touches && e.touches[0].clientX);
  const clientY = e.clientY || (e.touches && e.touches[0].clientY);
  
  if (!clientX || !clientY) return;

  const deltaX = clientX - mouseX;
  const deltaY = clientY - mouseY;
  
  mouseX = clientX;
  mouseY = clientY;
  
  const rect = element.getBoundingClientRect();
  const currentLeft = rect.left;
  const currentTop = rect.top;
  
  const maxX = window.innerWidth - element.offsetWidth;
  const maxY = window.innerHeight - element.offsetHeight;
  const minX = 0;
  const minY = 0;
  
  const newLeft = Math.max(minX, Math.min(maxX, currentLeft + deltaX));
  const newTop = Math.max(minY, Math.min(maxY, currentTop + deltaY));
  
  element.style.left = newLeft + "px";
  element.style.top = newTop + "px";
  
  element.style.right = "";
}

  function closeDragElement() {
    document.onmouseup = null;
    document.onmousemove = null;
    document.ontouchend = null;
    document.ontouchmove = null;
  }
}

        const isOpenedAppTrusted = isOpenedAppSystem || window.trustedAppsWhitelist.includes(openedApp);
        if (iframe && isOpenedAppTrusted) {
          const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          const iframeWin = iframe.contentWindow;
          
          if (!iframeWin.eruda) {
            const erudaScript = iframeDoc.createElement("script");
            erudaScript.src = "https://cdn.jsdelivr.net/npm/eruda";
            erudaScript.onload = function() {
              iframeWin.eruda.init();
              iframeWin.eruda.remove('elements');
              iframeWin.eruda.get().config.set('displaySize', 100);
              eruda.util.evalCss.setTheme("Material Oceanic");
            };
            iframeDoc.head.appendChild(erudaScript);
          }
        }
      }
    } else {
      
      eruda.destroy();
      if (openedApp) {
        const iframe = document.getElementById("iframe_" + openedApp);
if (iframe && iframe.contentWindow?.eruda) {
  iframe.contentWindow.eruda.destroy();
}
      }
    }
  } catch(e) {
    showInfoBox("DevTools error. Try again and, if you will see this error, reload KittenOS.");
    console.error(e);
  }
});

      applications = applications.filter(app => app.id !== id);

// --- PIN-code Logic (with SHA-256 Encryption) ---

let currentPinInput = ""; // Stores entered digits

// Helper to hash PIN using native SHA-256
async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Check if PIN is set in the system
function hasPin() {
  return localStorage.getItem("catos_pin") !== null;
}

// Show the lock screen
function showLockScreen() {
  const pinPan = document.getElementById("pinPan");
  const kittenOS = document.getElementById("KittenOS");
  
  kittenOS.style.visibility = "hidden";
  pinPan.style.display = "block";
  clearPin();
}

// Hide the lock screen
function hideLockScreen() {
  document.getElementById("pinPan").style.display = "none";
  document.getElementById("KittenOS").style.visibility = "visible";
}

// Append digit on button press
function AddToPin(num) {
  if (currentPinInput.length < 8) { // Maximum length of 8 digits
    currentPinInput += num;
    document.getElementById("pin").textContent = "• ".repeat(currentPinInput.length);
  }
}

// Clear the input field
function clearPin() {
  currentPinInput = "";
  document.getElementById("pin").textContent = "🔒";
}

// Verify PIN on "=>" button press
async function writePin() {
  const savedPinHash = localStorage.getItem("catos_pin");
  
  if (savedPinHash) {
    const inputHash = await hashPin(currentPinInput);
    if (inputHash === savedPinHash) {
      hideLockScreen();
    } else {
      showInfoBox("Incorrect PIN!");
      clearPin();
    }
  } else {
    hideLockScreen();
  }
}

// Settings: Create or change PIN
async function addPin() {
  // 1. If a PIN is already set, verify the old one first
  if (hasPin()) {
    const oldPin = prompt("Enter your CURRENT PIN to proceed:");
    if (oldPin === null) return; // Cancelled

    const oldHash = await hashPin(oldPin);
    const savedHash = localStorage.getItem("catos_pin");

    if (oldHash !== savedHash) {
      showInfoBox("Incorrect current PIN! Action cancelled.");
      return;
    }
  }

  // 2. Ask for the new PIN
  const newPin = prompt("Enter NEW PIN (digits only, min 4 digits):");
  if (newPin === null) return; // Cancelled
  
  if (!/^\d+$/.test(newPin) || newPin.length < 4) {
    showInfoBox("Error: PIN must be at least 4 digits long and contain only numbers!");
    return;
  }

  // 3. Ask to confirm the new PIN
  const confirmPin = prompt("Confirm your NEW PIN:");
  if (confirmPin === null) return; // Cancelled

  if (newPin !== confirmPin) {
    showInfoBox("Error: PINs do not match! Try again.");
    return;
  }

  // 4. Save to localStorage if everything matches
  const encryptedPin = await hashPin(newPin);
  localStorage.setItem("catos_pin", encryptedPin);
  showInfoBox("PIN successfully updated!");
  openPinUp(); // Closes setting window
}

// Settings: Remove PIN
async function delPin() {
  if (!hasPin()) {
    showInfoBox("No PIN is currently set.");
    return;
  }
  
  const currentPin = prompt("Enter current PIN to confirm removal:");
  if (currentPin === null) return; // Cancelled

  const inputHash = await hashPin(currentPin);
  const savedPinHash = localStorage.getItem("catos_pin");

  if (inputHash === savedPinHash) {
    localStorage.removeItem("catos_pin");
    showInfoBox("PIN successfully removed!");
    openPinUp(); // Closes setting window
  } else {
    showInfoBox("Incorrect PIN! Action cancelled.");
  }
}

//Wallpaper//

async function saveCustomBg(base64Data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("wallpapers", "readwrite");
    tx.objectStore("wallpapers").put(base64Data, "current");
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(tx.error);
  });
}

async function loadCustomBg() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("wallpapers", "readonly");
    const req = tx.objectStore("wallpapers").get("current");
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(tx.error);
  });
}

const BG_PRESETS = {
  lake: "url('https://upload.wikimedia.org/wikipedia/commons/9/95/Taiga_Lake_And_Forest_%2856969730%29.jpeg')",
  green: "none",
  gradient: "linear-gradient(110deg, #045, #047, #08d)"
};

function changeBackground(type) {
  const body = document.body;
  
  if (type === "custom") {
    let fileInput = document.getElementById("bg-file-hidden");
    if (!fileInput) {
      fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.id = "bg-file-hidden";
      fileInput.accept = "image/*";
      fileInput.style.display = "none";
      fileInput.onchange = function() { uploadCustomBackground(this); };
      document.body.appendChild(fileInput);
    }
    fileInput.click();
    return;
  }
  
  localStorage.setItem("catos_bg_type", type);
  body.style.backgroundImage = BG_PRESETS[type];
  body.style.backgroundColor = (type === "green") ? "#067" : "";
}

function uploadCustomBackground(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64Url = e.target.result;
    try {
      await saveCustomBg(base64Url);
      localStorage.setItem("catos_bg_type", "custom");
      
      document.body.style.backgroundImage = `url(${base64Url})`;
      showInfoBox("Wallpaper updated!");
    } catch (error) {
      showInfoBox("Failed to save image.");
      console.error(error);
      
      const select = document.getElementById("bg-select");
      if (select) select.value = localStorage.getItem("catos_bg_type") || "lake";
    }
  };
  reader.readAsDataURL(file);
}

async function initBackground() {
  const savedType = localStorage.getItem("catos_bg_type") || "lake";
  
  const select = document.getElementById("bg-select");
  if (select) {
    select.value = savedType;
  }
  
  const body = document.body;
  if (savedType === "custom") {
    try {
      const savedCustom = await loadCustomBg();
      if (savedCustom) {
        body.style.backgroundImage = `url(${savedCustom})`;
      } else {
        changeBackground("lake");
      }
    } catch (e) {
      console.error("Error loading bg from IndexedDB:", e);
      changeBackground("lake");
    }
  } else {
    body.style.backgroundImage = BG_PRESETS[savedType];
    body.style.backgroundColor = (savedType === "green") ? "#067" : "";
  }
}
