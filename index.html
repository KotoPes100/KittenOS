#apps {
  height: calc(100vh - 5px);
  width: 60px !important;
  position: fixed;
  margin: 2.5px;
  top: 0;
  left: 0;
  overflow: visible;
  /* Убиваем блюр на самом родителе, чтобы он не обрезал плашки */
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  border: none !important;
  background: none !important;
}

/* Рисуем стеклянный фон отдельно под кнопками */
#apps::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(3px) saturate(110%);
  -webkit-backdrop-filter: blur(3px) saturate(110%);
  z-index: -1;
}
    
    .appIcon {
      width: 50px;
      height: 50px;
      padding: 0 !important;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

.application {
  position: fixed;
  top: 0;
  left: 65px;
  height: 100%;
  width: calc(100% - 65px);
  border: none;
  z-index: 10; 

  /* Базовое скрытое состояние для анимации */
  opacity: 0;
  transform: scale(0.96);
  
  /* Плавность перехода прозрачности и масштаба */
  transition: opacity 0.5s ease-out, transform 0.5s ease-out;
}

/* Класс плавного появления */
.application.visible {
  opacity: 1;
  transform: scale(1);
}

    #closeBtn {
  position: fixed; 
  top: 5px; 
  right: 5px;

:root {
      --bg: #0b0b0f;
      --frame: rgba(255,255,255,.78);
      --text: #ffffff;
      --green: #34c759;
      --yellow: #ffd60a;
      --red: red;
    }

    * { box-sizing: border-box; }

    .wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
      scale: 0.67;
    }

    .battery {
      position: relative;
      width: 128px;
      height: 62px;
      padding: 4px;
      border: 1px solid var(--frame);
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 20px;
      width: 6px;
      height: 20px;
      border-radius: 0 4px 4px 0;
      background: var(--frame);
    }

    .fill {
      position: absolute;
      inset: 4px;
      width: 50%;
      border-radius: 11px;
      background: var(--green);
      transition: width .35s ease, background-color .35s ease;
    }

    .battery.charging .fill {
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.01); }
    }

    .label {
      position: absolute;
      inset: 0;
      display: flex;
      place-items: center;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 1px 1px rgba(0,0,0,.25);
      z-index: 2;
      user-select: none;
    }

    .status {
      font-size: 15px;
      opacity: .9;
      letter-spacing: -0.01em;
    }
    
    /* Контейнер иконки делаем относительным для позиционирования меню */
.appIcon {
  position: relative; /* Важно для дочернего меню */
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none; /* отключает системное меню при долгом тапе (iOS/некоторые WebView) */
  touch-action: manipulation; /* браузер не пытается зумить/скроллить/распознавать другие жесты на долгом тапе */
}

/* Стили всплывающего меню */
.app-tooltip {
  position: fixed; /* fixed + top из JS (по иконке), left зафиксирован — не съезжает вправо и не создаёт горизонтальный скролл */
  left: 70px; /* сразу за панелью #apps (60px + margin) */
  top: 0;
  transform: translateY(-50%) scale(0.95);
  padding: 6px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 5000;
  white-space: nowrap;
}

/* Показываем через явный класс (тултип живёт в body, а не внутри кнопки —
   поэтому не полагаемся на CSS-селекторы потомков вроде .appIcon:hover .app-tooltip) */
.app-tooltip.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(-50%) scale(1.02);
}

.tooltip-name {
  font-size: 13px;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  font-weight: bold;
}

.tooltip-del-btn {
  border-radius: 6px;
  color: #f00;
  font-size: 11px;
  padding: 2px 6px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: none;
}
.tooltip-del-btn:active {
  transform: scale(0.95);
}
.appIcon.opened {
    background: rgba(0, 200, 100, 0.2);
}
.appIcon.nowOp {
    background: rgba(200, 0, 100, 0.2);
}
#applications {
  max-height: calc(100vh - 60px);
  border-radius: 30px;
  overflow-y: auto;
}
.tooltip {  margin: 5px 65px; display: none; z-index: 99999999;  }
  </style>

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open("KittenOS_DB", 1);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("apps")) {
        db.createObjectStore("apps", { keyPath: "id" });
      }
    };
    request.onsuccess = (e) => resolve(e.target.result);
    request.onerror = (e) => reject(e.target.error);
  });
}

function loadAppsFromDB(db) {

    request.onerror = () => reject(request.error);
  });
}

function renderApps() {
  const container = document.getElementById("applications");
  container.innerHTML = ""; 
  // Тултипы теперь лежат в body отдельно от контейнера — чистим их тоже, иначе накопятся дубликаты
  document.querySelectorAll('.app-tooltip').forEach(el => el.remove());

  applications.forEach((app) => {
    const btn = document.createElement("button");
    btn.className = "appIcon";
    btn.id = app.id;
    btn.innerHTML = app.icon.includes('.') ? `<img src="${app.icon}" width="100%">` : app.icon || app.name[0];
    
    // Клик открывает приложение
    btn.onclick = () => openApp(app.id);

    // Создаем тултип ПЕРСОНАЛЬНО для этой иконки
    const tooltip = document.createElement("panel");
    tooltip.className = "app-tooltip";

    const nameSpan = document.createElement("span");
    nameSpan.className = "tooltip-name";
    nameSpan.textContent = app.name;
    tooltip.appendChild(nameSpan);

    // Проверяем на системные приложения
    const isSystemApp = ["cat-files", "cat-gallery", "cat-camera", "cat-browser", "cat-calculator", "cat-list", "cat-s_maps", "cat-weather"].includes(app.id);

    if (!isSystemApp) {
      // Кнопка Trust/Untrust
      const trustBtn = document.createElement("button");
      trustBtn.className = "tooltip-del-btn";
      trustBtn.style.color = "deepskyblue"; 
      trustBtn.style.marginBottom = "5px";
      
      const isTrusted = window.trustedAppsWhitelist.includes(app.id);
      trustBtn.textContent = isTrusted ? "🛡️ Untrust" : " Trust";
      
      trustBtn.onclick = (e) => {
        e.stopPropagation();
        toggleAppTrust(app.id);
      };
      tooltip.appendChild(trustBtn);

      // Кнопка Delete
      const delBtn = document.createElement("button");
      delBtn.className = "tooltip-del-btn";
      delBtn.textContent = "Delete";
      delBtn.onclick = (e) => deleteApp(app.id, e);
      tooltip.appendChild(delBtn);
    }

    // ВАЖНО: тултип кладём в body, а НЕ внутрь кнопки.
    // Кнопка получает transform: scale(0.99) в состоянии :active (пока палец удерживается —
    // а это как раз всё время долгого нажатия), и transform на предке ломает position: fixed
    // у потомка (превращает его в absolute относительно этого предка). Поэтому тултип
    // должен физически лежать вне кнопки, а связь с иконкой держим через JS-класс btn.tooltip.
    document.body.appendChild(tooltip);
    btn.tooltip = tooltip;

    // --- Обработка ТАЧ-событий с задержкой 1.5 секунды ---
    let touchTimeout;

    // Блокируем системное контекстное меню при долгом тапе — иначе оно может
    // перехватить жест раньше, чем сработает наш таймер
    btn.addEventListener('contextmenu', (e) => e.preventDefault());

    btn.addEventListener('touchstart', (e) => {
      if (e.target.classList.contains('tooltip-del-btn')) return;

      // Задержка 1500мс (1.5 секунды) для мобильного UI
      touchTimeout = setTimeout(() => {
        // Сначала гасим другие активные тултипы
        document.querySelectorAll('.appIcon.touch-active').forEach(el => {
          if (el !== btn) {
            el.classList.remove('touch-active');
            if (el.tooltip) el.tooltip.classList.remove('visible');
          }
        });

        // Позиционируем тултип по вертикали напротив нажатой иконки (left зафиксирован в CSS)
        const rect = btn.getBoundingClientRect();
        tooltip.style.top = (rect.top + rect.height / 2) + "px";

        btn.classList.add('touch-active');
        tooltip.classList.add('visible');
      }, 1500);
    });

    btn.addEventListener('touchend', () => {
      clearTimeout(touchTimeout);
    });

    btn.addEventListener('touchcancel', () => {
      clearTimeout(touchTimeout);
    });

    // Ховер для ПК (тултип теперь в body, поэтому не через CSS :hover, а явно).
    // Скрытие делаем с небольшой задержкой, отменяемой при входе мыши в сам тултип —
    // иначе путь курсора от иконки к кнопкам Trust/Delete проходил бы через "пустоту"
    // между ними и гасил тултип раньше, чем мышь успевала до них доехать.
    let hoverHideTimeout;
    const showTooltip = () => {
      clearTimeout(hoverHideTimeout);
      const rect = btn.getBoundingClientRect();
      tooltip.style.top = (rect.top + rect.height / 2) + "px";
      tooltip.classList.add('visible');
    };
    const hideTooltipDelayed = () => {
      hoverHideTimeout = setTimeout(() => tooltip.classList.remove('visible'), 150);
    };
    btn.addEventListener('mouseenter', showTooltip);
    btn.addEventListener('mouseleave', hideTooltipDelayed);
    tooltip.addEventListener('mouseenter', () => clearTimeout(hoverHideTimeout));
    tooltip.addEventListener('mouseleave', hideTooltipDelayed);

    container.appendChild(btn);
  });

  // Закрытие тултипов при таче в любое другое место экрана
  // (тултип физически лежит в body, поэтому проверяем ещё и .app-tooltip,
  // иначе тап по кнопке Trust/Delete внутри тултипа считался бы тапом "снаружи"
  // и прятал тултип раньше, чем успевал сработать сам клик)
  document.addEventListener('touchstart', (e) => {
    if (!e.target.closest('.appIcon') && !e.target.closest('.app-tooltip')) {
      document.querySelectorAll('.appIcon.touch-active').forEach(el => {
        el.classList.remove('touch-active');
        if (el.tooltip) el.tooltip.classList.remove('visible');
      });
    }
  }, { passive: true });
}

// БЕЗОПАСНОСТЬ: Функция переключения уровня доверия приложения
function toggleAppTrust(appId) {
  let whitelist = JSON.parse(localStorage.getItem('catos_trusted_apps') || '[]');
  const isCurrentlyTrusted = whitelist.includes(appId);

  if (!isCurrentlyTrusted) {
    const warningMessage = 
      "⚠️ WARNING: SECURITY RISK\n\n" +
      "By trusting this application, you remove its security sandbox and grant it UNRESTRICTED access to your KittenOS Core and File System.\n\n" +
      "Untrusted apps can function normally but cannot access or steal your data.\n\n" +
      "Are you sure you want to trust this app?";

    if (confirm(warningMessage)) {
      whitelist.push(appId);
      localStorage.setItem('catos_trusted_apps', JSON.stringify(whitelist));
      window.trustedAppsWhitelist = whitelist;
      showInfoBox("Application trusted. Please open it to apply full filesystem access.");
      renderApps();
    }
  } else {
    whitelist = whitelist.filter(id => id !== appId);
    localStorage.setItem('catos_trusted_apps', JSON.stringify(whitelist));
    window.trustedAppsWhitelist = whitelist;
    showInfoBox("Trust revoked. Application is now securely sandboxed.");
    renderApps();
    
    // Если приложение открыто, грохаем его фрейм, чтобы принудительно вернуть в песочницу
    if(document.getElementById("iframe_" + appId)){closeApp(appId)}
   }
}


function openApp(id) {
  document.getElementById(id).classList.add('opened');
  document.getElementById(id).classList.add('nowOp');
  
  // 1. Сворачивание приложения при повторном клике
  if (openedApp === id) {
    const currentIframe = document.getElementById("iframe_" + id);
    document.getElementById(openedApp).classList.remove('nowOp')
    if (currentIframe) {
      currentIframe.classList.remove("visible"); // Запускаем скрытие анимацией
      setTimeout(() => {
        currentIframe.style.display = "none"; // Прячем совсем после окончания анимации
      }, 500);
    }
    openedApp = null;
    return;
  }

  // 2. Если открыто другое приложение — скрываем его фон
  if (openedApp !== null) {
    const oldIframe = document.getElementById("iframe_" + openedApp);
    if (oldIframe) {
      oldIframe.classList.remove("visible");
      oldIframe.style.display = "none"; // Ему display гасим сразу, так как поверх наплывает новое
    }
    document.getElementById(openedApp).classList.remove('nowOp')
  }

  // 3. (Код создания iframe оставляем без изменений)
  let iframe = document.getElementById("iframe_" + id);
  if (!iframe) {
    const appData = applications.find(app => app.id === id);
    if (!appData) return;

    iframe = document.createElement("iframe");
    iframe.id = "iframe_" + id;
    iframe.className = "application";
    iframe.src = appData.code;
    
    // БЕЗОПАСНОСТЬ: Настройка песочницы при генерации фрейма
    const isSystemApp = (id === "cat-s_maps" || id === "cat-s_pres" || id === "cat-weather" || id === "cat-files" || id === "cat-camera" || id === "cat-gallery");
    const isTrusted = isSystemApp || window.trustedAppsWhitelist.includes(id);

    if (isTrusted) {
      // Системные и Доверенные — открытый доступ БЕЗ sandbox вообще
      iframe.removeAttribute('sandbox');
    } else {
      // Сторонние без доверия — Включаем жесткий sandbox без allow-same-origin
      iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-popups allow-modals allow-downloads');
    }

    
    iframe.onload = function() {
      // Недоверенные приложения в sandbox БЕЗ allow-same-origin: доступ к их
      // contentDocument заведомо невозможен и бросит SecurityError в консоль
      // (даже с того же домена — sandbox без allow-same-origin даёт iframe
      // уникальное origin). Это ожидаемое поведение песочницы, а не сбой,
      // поэтому для таких приложений даже не пытаемся туда лезть.
      if (!isTrusted) return;

      try {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const iframeWin = iframe.contentWindow;
        const msgScript = iframeDoc.createElement("script");
        msgScript.textContent = `function message(type, data){ window.parent.postMessage({ type, data }, "*"); }`;
        iframeDoc.head.appendChild(msgScript);

        // Перехват кликов по внешним ссылкам: вместо навигации внутри самого
        // приложения — просим KittenOS открыть их новой вкладкой в браузере.
        if (id !== "cat-browser") {
          const linkScript = iframeDoc.createElement("script");
          linkScript.textContent = `
            document.addEventListener('click', function(e) {
              let el = e.target;
              while (el && el !== document) {
                if (el.tagName === 'A' && el.href && /^https?:\\/\\//i.test(el.href)) {
                  e.preventDefault();
                  e.stopPropagation();
                  window.parent.postMessage({ type: 'openInBrowser', data: { url: el.href } }, '*');
                  return;
                }
                el = el.parentElement;
              }
            }, true);
          `;
          iframeDoc.head.appendChild(linkScript);
        }

        const devSwitch = document.getElementById("dev-switch");
        if (devSwitch && devSwitch.checked) {
          const erudaScript = iframeDoc.createElement("script");
          erudaScript.src = "../library/eruda.js"; 
          erudaScript.onload = function() {
            iframeWin.eruda.init();
            iframeWin.eruda.remove('sources');
            iframeWin.eruda.get().config.set('displaySize', 100);
            iframeWin.eruda.util.evalCss.setTheme("Material Lighter");
          };
          iframeDoc.head.appendChild(erudaScript);
        }
      } catch (e) {
        console.error("Failed to embed developer tools in iframe:", e);
      }
    };

    document.getElementById("KittenOS").appendChild(iframe);
  }

  // 4. Секрет плавности: display меняется мгновенно, а класс visible с микрозадержкой
  iframe.style.display = "block";
  
  requestAnimationFrame(() => {
    // Ждем следующего кадра отрисовки, чтобы браузер успел применить display: block
    requestAnimationFrame(() => {
      iframe.classList.add("visible");
    });
  });

  openedApp = id;
}

async function install() {
  const idInput = document.getElementById("ins-id").value.trim();
  const nameInput = document.getElementById("ins-name").value.trim();
  const iconInput = document.getElementById("ins-icon").value.trim();
  const fileInput = document.getElementById("ins-file");

  if (!idInput || !nameInput) {
    showInfoBox("          ,           App id   App name!");
    return;
  }

  const uploadedFiles = Array.from(fileInput.files);
  if (uploadedFiles.length === 0) {
    showInfoBox("          ,          HTML                !");
    return;
  }

  try {
    let filesMap = {};
    let htmlContent = "";

    // Обработка ZIP-архива
    if (uploadedFiles.length === 1 && uploadedFiles[0].name.endsWith('.zip')) {
      const zipFile = uploadedFiles[0];
      const jszip = new JSZip();
      const zip = await jszip.loadAsync(zipFile);
      
      const promises = [];

      zip.forEach((relativePath, file) => {
        if (!file.dir) {
          if (relativePath.includes('__MACOSX')) return;

          const pureName = relativePath.split('/').pop();
          
          // Проверяем, является ли файл картинкой/текстурой
          const isImage = /\.(png|jpg|jpeg|gif|webp|svg|ico)$/i.test(pureName);

          let promise;
          if (isImage) {
            // Читаем картинки как бинарный Base64
            promise = file.async("base64").then((base64) => {
              let ext = pureName.split('.').pop().toLowerCase();
              if (ext === "jpg") ext = "jpeg";
              if (ext === "svg") ext = "svg+xml";
              const dataUrl = `data:image/${ext};base64,${base64}`;
              
              filesMap[pureName] = dataUrl;
              filesMap[relativePath] = dataUrl;
            });
          } else {
            // Читаем код (.html, .js, .css) как текст
            promise = file.async("string").then((content) => {
              if (pureName.endsWith('.html')) {
                htmlContent = content;
              }
              filesMap[pureName] = content;
              filesMap[relativePath] = content;
            });
          }
          promises.push(promise);
        }
      });

      await Promise.all(promises);

    } else {
      // Стандартная логика KittenOS для обычных файлов
      const htmlFile = uploadedFiles.find(f => f.name.endsWith('.html'));
      if (!htmlFile) {
        showInfoBox("One of these files must be html!");
        return;
      }

      for (let file of uploadedFiles) {
        if (file !== htmlFile) {
          filesMap[file.name] = await readFileContent(file);
        }
      }
      htmlContent = await readFileContent(htmlFile);
    }

    if (!htmlContent) {
      showInfoBox("One of these files must be html!");
      return;
    }

    // Парсинг структуры HTML
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, "text/html");

    // Вспомогательная функция для замены путей картинок в CSS-строках url(...)
    const replaceUrlsInCss = (cssText) => {
      let updatedCss = cssText;
      for (let key in filesMap) {
        if (filesMap[key].startsWith('data:image')) {
          const escapedKey = key.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
          const regex = new RegExp(`url\\(\\s*['"]?` + escapedKey + `['"]?\\s*\\)`, 'g');
          updatedCss = updatedCss.replace(regex, `url(${filesMap[key]})`);
        }
      }
      return updatedCss;
    };

    // 1. Инжект внешних стилей + замена текстур в них
    const links = doc.querySelectorAll('link[rel="stylesheet"]');
    links.forEach(link => {
      const href = link.getAttribute('href');
      if (href) {
        const pureHref = href.split('/').pop();
        let styleContent = filesMap[href] || filesMap[pureHref] || filesMap['./' + pureHref];
        if (styleContent) {
          styleContent = replaceUrlsInCss(styleContent); // Меняем url('картинка.png') на base64
          const styleTag = doc.createElement('style');
          styleTag.textContent = styleContent;
          link.replaceWith(styleTag);
        }
      }
    });

    // 2. Замена текстур в уже имеющихся внутри HTML тегах <style>
    doc.querySelectorAll('style').forEach(styleTag => {
      styleTag.textContent = replaceUrlsInCss(styleTag.textContent);
    });

    // 3. Инжект скриптов из <script src="..."></>
    const scripts = doc.querySelectorAll('script[src]');
    scripts.forEach(script => {
      const src = script.getAttribute('src');
      if (src) {
        const pureSrc = src.split('/').pop();
        const scriptContent = filesMap[src] || filesMap[pureSrc] || filesMap['./' + pureSrc];
        if (scriptContent) {
          const scriptTag = doc.createElement('script');
          scriptTag.textContent = scriptContent;
          script.removeAttribute('src'); 
          script.replaceWith(scriptTag);
        }
      }
    });

    // 4. Инжект текстур прямо в теги <img> внутри игры
    doc.querySelectorAll('img[src]').forEach(img => {
      const src = img.getAttribute('src');
      if (src) {
        const pureSrc = src.split('/').pop();
        const imgData = filesMap[src] || filesMap[pureSrc] || filesMap['./' + pureSrc];
        if (imgData && imgData.startsWith('data:image')) {
          img.setAttribute('src', imgData);
        }
      }
    });

    // 5. Инжект текстур в инлайновые стили элементов (например: style="background: url(...)")
    doc.querySelectorAll('[style]').forEach(el => {
      let styleAttr = el.getAttribute('style');
      if (styleAttr && styleAttr.includes('url(')) {
        el.setAttribute('style', replaceUrlsInCss(styleAttr));
      }
    });

    // Сборка итогового Blob (принудительно UTF-8)
    const finalHtmlString = doc.documentElement.outerHTML;
    const finalBlob = new Blob([finalHtmlString], { type: 'text/html;charset=utf-8' });

    // Сохранение и рендер в систему
    const blobUrl = URL.createObjectURL(finalBlob);
    const newApp = {
      id: idInput,
      name: nameInput,
      icon: iconInput || nameInput[0],
      code: blobUrl,
      file: finalBlob
    };

    applications.push(newApp);
    renderApps();
    saveAppToDB(newApp);

    // Очистка формы инсталлятора
    document.getElementById("ins-id").value = "";
    document.getElementById("ins-name").value = "";
    document.getElementById("ins-icon").value = "";
    fileInput.value = ""; 
    document.getElementById("app-installer").style.display = "none";

    showInfoBox(`App "${nameInput}" was installed!`);

  } catch (error) {
    console.error(error);
    showInfoBox("Error processing files.");
  }
}

function readFileContent(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsText(file);
  });
}

function makeDragable(element) {
  let posX = 0, posY = 0, mouseX = 0, mouseY = 0;

  element.onmousedown = dragMouseDown;
  element.ontouchstart = dragMouseDown;

  function dragMouseDown(e) {
    e = e || window.event;
    const clientX = e.clientX || e.touches[0].clientX;
    const clientY = e.clientY || e.touches[0].clientY;
    
    mouseX = clientX;
    mouseY = clientY;
    
    document.onmouseup = closeDragElement;
    document.ontouchend = closeDragElement;
    
    document.onmousemove = elementDrag;
    document.ontouchmove = elementDrag;
  }

function elementDrag(e) {
  e = e || window.event;
  
  const clientX = e.clientX || (e.touches && e.touches[0].clientX);
  const clientY = e.clientY || (e.touches && e.touches[0].clientY);
  
  if (!clientX || !clientY) return;

  const deltaX = clientX - mouseX;
  const deltaY = clientY - mouseY;
  
  mouseX = clientX;
  mouseY = clientY;
  
  const rect = element.getBoundingClientRect();
  const currentLeft = rect.left;
  const currentTop = rect.top;
  
  const maxX = window.innerWidth - element.offsetWidth;
  const maxY = window.innerHeight - element.offsetHeight;
  const minX = 0;
  const minY = 0;
  
  const newLeft = Math.max(minX, Math.min(maxX, currentLeft + deltaX));
  const newTop = Math.max(minY, Math.min(maxY, currentTop + deltaY));
  
  element.style.left = newLeft + "px";
  element.style.top = newTop + "px";
  
  element.style.right = "";
}

  function closeDragElement() {
    document.onmouseup = null;
    document.onmousemove = null;
    document.ontouchend = null;
    document.ontouchmove = null;
  }
}

// Ретрансляция запроса "открой ссылку в браузере" от произвольного приложения
// в iframe приложения cat-browser (приложения не могут слать сообщения друг
// другу напрямую, только через родительское окно KittenOS).
window.addEventListener('message', function(event) {
  const msg = event.data;
  if (!msg || typeof msg !== "object") return;
  if (msg.type === "openInBrowser" && msg.data && msg.data.url) {
    openUrlInBrowser(msg.data.url);
  }
});

function openUrlInBrowser(url) {
  const hadIframe = !!document.getElementById("iframe_cat-browser");
  openApp("cat-browser");

  const iframe = document.getElementById("iframe_cat-browser");
  if (!iframe) return;

  if (hadIframe) {
    // Браузер уже был открыт раньше - его скрипт точно готов принимать сообщения
    try {
      iframe.contentWindow.postMessage({ type: "catOpenNewTab", url: url }, "*");
    } catch (e) {
      console.error("Failed to send URL to browser app:", e);
    }
  } else {
    // Iframe только что создан - дожидаемся полной загрузки apps/browser.html
    iframe.addEventListener("load", function onLoad() {
      iframe.removeEventListener("load", onLoad);
      iframe.contentWindow.postMessage({ type: "catOpenNewTab", url: url }, "*");
    });
  }
}

      // недоверенные приложения в sandbox без allow-same-origin не дают
      // доступа к contentDocument, это ожидаемо, а не ошибка)
      if (openedApp) {
        const iframe = document.getElementById("iframe_" + openedApp);
        const isOpenedAppSystem = (openedApp === "cat-s_maps" || openedApp === "cat-s_pres" || openedApp === "cat-weather" || openedApp === "cat-files" || openedApp === "cat-camera" || openedApp === "cat-gallery");
        const isOpenedAppTrusted = isOpenedAppSystem || window.trustedAppsWhitelist.includes(openedApp);
        if (iframe && isOpenedAppTrusted) {
          const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          const iframeWin = iframe.contentWindow;
          
          if (!iframeWin.eruda) {
            const erudaScript = iframeDoc.createElement("script");
            erudaScript.src = "https://cdn.jsdelivr.net/npm/eruda";
            erudaScript.onload = function() {
              iframeWin.eruda.init();
              iframeWin.eruda.remove('elements');
              iframeWin.eruda.get().config.set('displaySize', 100);
              eruda.util.evalCss.setTheme("Material Oceanic");
            };
            iframeDoc.head.appendChild(erudaScript);
          }
        }
      }
    } else {
      // Выключаем везде
      eruda.destroy();
      if (openedApp) {
        const iframe = document.getElementById("iframe_" + openedApp);
if (iframe && iframe.contentWindow?.eruda) {
  iframe.contentWindow.eruda.destroy();
}
      }
    }
  } catch(e) {
    showInfoBox("DevTools error. Try again and, if you will see this error, reload KittenOS.");
    console.error(e);
  }
});

// Функция удаления приложения
function deleteApp(id, e) {
  if (e) e.stopPropagation(); // Предотвращаем запуск самого приложения при клике на удаление

  if (!confirm("Are you shure want to delete this app?")) return;

  openDB().then(db => {
    const tx = db.transaction("apps", "readwrite");
    const store = tx.objectStore("apps");
    store.delete(id);
    
    tx.oncomplete = () => {
      // Удаляем из локального массива и перерисовываем
      applications = applications.filter(app => app.id !== id);
      renderApps();
      
      // Если удаляемое приложение было открыто, закрываем его iframe
      const iframe = document.getElementById("iframe_" + id);
      if (iframe) iframe.remove();
      if (openedApp === id) openedApp = null;
    };
  }).catch(err => console.error("Delete error:", err));
}

const batteryEl = document.getElementById('battery');
    const fillEl = document.getElementById('fill');
    const labelEl = document.getElementById('label');
    const statusEl = document.getElementById('status');

    function getColor(p, charging) {
      if (charging) return 'var(--green)';
      if (p <= 20) return 'var(--red)';
      if (p <= 40) return 'var(--yellow)';
      return 'var(--green)';
    }

    function render(level, charging) {
      const p = Math.round(level * 100);
      fillEl.style.width = p + '%';
      fillEl.style.backgroundColor = getColor(p, charging);
      labelEl.textContent = p + '%';
      statusEl.textContent = charging ? '⚡️' : '';
      batteryEl.classList.toggle('charging', charging);
    }

    if ('getBattery' in navigator) {
      navigator.getBattery().then((battery) => {
        render(battery.level, battery.charging);

        battery.addEventListener('levelchange', () => render(battery.level, battery.charging));
        battery.addEventListener('chargingchange', () => render(battery.level, battery.charging));
      });
    } else {
      labelEl.textContent = '    ';
      statusEl.textContent = 'Error';
      fillEl.style.width = '100%';
